version: "3.9"

services:
  stockfish:
    build: ./stockfish
    container_name: stockfish_engine
    ports:
    - "3334:3334"

  analyzer:
    build: ./engine
    container_name: chess_analyzer
    environment:
        - LICHESS_USERNAME=${LICHESS_USERNAME}
    depends_on:
      - stockfish

  collector:
    build: ./collectors
    container_name: chess_collector
    environment:
        - LICHESS_USERNAME=${LICHESS_USERNAME}