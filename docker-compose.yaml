version: "3.9"

services:
  stockfish:
    build:
      context: .
      dockerfile: Dockerfile.stockfish
    container_name: stockfish_engine
    ports:
    - "3334:3334"

  analyzer:
    build:
      context: .
      dockerfile: Dockerfile.analyzer
    container_name: chess_analyzer
    environment:
        - LICHESS_USERNAME=${LICHESS_USERNAME}
    depends_on:
      - stockfish